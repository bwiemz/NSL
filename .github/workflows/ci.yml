name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-14, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --workspace

      - name: Unit tests
        run: cargo test --workspace -- --skip e2e_

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

      - name: E2E smoke tests (Linux/Windows)
        if: runner.os != 'macOS'
        run: cargo test -p nsl-cli --test e2e -- --test-threads=1

      - name: E2E smoke tests (macOS, non-blocking)
        if: runner.os == 'macOS'
        continue-on-error: true
        run: cargo test -p nsl-cli --test e2e -- --test-threads=1
