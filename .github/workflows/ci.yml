name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
          - os: windows-latest
          # macOS ARM64 PIE text-relocation issue is addressed by the Cranelift
          # is_pic fix in binary_codegen.rs (this PR).  A follow-up CI run will
          # verify the fix and graduate macOS to required once all tests pass.
          - os: macos-14
            optional: true
          - os: macos-latest
            optional: true
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.optional == true }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          # Pin to the same version as rust-toolchain.toml so that clippy is
          # installed for the exact toolchain the workspace uses. The prior
          # approach (install stable, then `rustup component add clippy
          # --toolchain 1.95.0`) fails on macOS runners when the component
          # manifest doesn't expose a standalone clippy binary for 1.95.0 on
          # that host triple. Using the `toolchain` input lets dtolnay/rust-
          # toolchain resolve and install clippy correctly on all platforms.
          toolchain: 1.95.0
          components: clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --workspace

      - name: Unit tests
        run: cargo test --workspace -- --skip e2e_

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

      - name: E2E smoke tests (Linux/Windows)
        if: runner.os != 'macOS'
        run: cargo test -p nsl-cli --test e2e -- --test-threads=1

      - name: E2E smoke tests (macOS, non-blocking)
        if: runner.os == 'macOS'
        continue-on-error: true
        run: cargo test -p nsl-cli --test e2e -- --test-threads=1

  # WGGO Phase 2 merge-gate — required check that gates merging any change to
  # nsl-codegen, nsl-runtime, or nsl-semantic.  Graduated from the preview job
  # in PR #217 (commit 2): the test is now live (no #[ignore]) so
  # --include-ignored is no longer needed.  Spec §7.4.
  wggo-merge-gate:
    name: WGGO Phase 2 merge-gate
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
          components: clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Run WGGO merge-gate test
        run: |
          cargo test -p nsl-codegen --test wggo_backward_pipeline \
            end_to_end_backward_subprocess_matches_analytical_reference \
            -- --nocapture

  # M62b Spec C — ONNX Runtime custom op integration tests.
  # Always runs on PRs and pushes to main. The job is cheap (~5 min) and
  # the Rust-side gated tests don't require an ORT install; only the Python
  # E2E step does. Spec §3.4 (separate CI job; default loop stays ORT-free)
  # is honored because the steps that touch ORT runtime are isolated here —
  # the main `build-and-test` job above does NOT compile the onnx-rt-op
  # feature.
  test-onnx-rt:
    name: M62b Spec C — ONNX RT integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.95.0
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
          components: clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-onnxrt-${{ hashFiles('**/Cargo.lock') }}

      - name: Install bindgen-cli
        run: cargo install bindgen-cli --locked

      - name: Install ONNX Runtime 1.22.0
        run: |
          wget -q https://github.com/microsoft/onnxruntime/releases/download/v1.22.0/onnxruntime-linux-x64-1.22.0.tgz
          tar -xzf onnxruntime-linux-x64-1.22.0.tgz
          echo "$PWD/onnxruntime-linux-x64-1.22.0/lib" >> $GITHUB_PATH
          echo "ORT_HOME=$PWD/onnxruntime-linux-x64-1.22.0" >> $GITHUB_ENV
          echo "LD_LIBRARY_PATH=$PWD/onnxruntime-linux-x64-1.22.0/lib:${LD_LIBRARY_PATH:-}" >> $GITHUB_ENV

      - name: Verify vendoring matches upstream
        run: bash tools/verify-ort-vendoring.sh

      - name: Build with onnx-rt-op feature
        run: cargo build --workspace --features onnx-rt-op

      - name: Cargo test (onnx-rt-op feature)
        # Only run the Spec C integration tests; the rest of the workspace
        # is already covered by `build-and-test` above without the feature.
        run: |
          cargo test -p nsl-runtime --features onnx-rt-op \
            --test onnx_rt_compute_bridge \
            --test onnx_rt_register_custom_ops

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps for E2E
        run: pip install onnxruntime==1.22.0 onnx pytest numpy

      - name: Build nsl-cli with onnx-rt-op
        run: cargo build -p nsl-cli --features onnx-rt-op

      - name: Python E2E (gated)
        env:
          NSL_TEST_ONNX_RT: "1"
          NSL_BIN: ${{ github.workspace }}/target/debug/nsl
        working-directory: python
        run: python -m pytest tests/test_m62_onnx_op.py -v

  # M57 FPGA/Neuromorphic — Verilator + Yosys gate (from origin/main PR #193).
  fpga:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0

      - name: Install Verilator + Yosys
        run: sudo apt-get update && sudo apt-get install -y verilator yosys

      - name: Record tool versions (provenance per §5.4)
        run: |
          echo "Ubuntu: $(lsb_release -ds)"
          verilator --version
          yosys -V

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-fpga-${{ hashFiles('**/Cargo.lock') }}

      - name: Build NSL codegen
        run: cargo build -p nsl-codegen --release

      - name: Run Layer 1 snapshot tests
        run: cargo test -p nsl-codegen --test verilog_emission_snapshots --test hir_pass_snapshots

      - name: Run Layer 3 Yosys gate
        run: cargo test -p nsl-codegen --test yosys_gate

      - name: Fixture determinism check
        run: |
          cp crates/nsl-test/fixtures/mlp_int8_weights_v1.bin /tmp/committed.bin
          cargo run -p nsl-test --bin generate_mlp_int8_weights_v1
          cmp --silent /tmp/committed.bin crates/nsl-test/fixtures/mlp_int8_weights_v1.bin \
            || (echo "ERROR: regenerated fixture differs from committed fixture" && exit 1)

      - name: Run nsl-test lib unit tests
        run: cargo test -p nsl-test --lib
