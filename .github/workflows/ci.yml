name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
          - os: windows-latest
          # macOS ARM64 PIE enforcement rejects Cranelift-generated objects with
          # absolute relocations in .text sections.  The affected tests are all
          # #[cfg_attr(target_os = "macos", ignore)]'d, but other macOS-specific
          # failures (clippy, build order, SDK quirks) remain under investigation.
          # Mark macOS as optional so these known-flaky platforms do not block
          # PR merges while the root cause is tracked down.
          - os: macos-14
            optional: true
          - os: macos-latest
            optional: true
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.optional == true }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          # Pin to the same version as rust-toolchain.toml so that clippy is
          # installed for the exact toolchain the workspace uses. The prior
          # approach (install stable, then `rustup component add clippy
          # --toolchain 1.95.0`) fails on macOS runners when the component
          # manifest doesn't expose a standalone clippy binary for 1.95.0 on
          # that host triple. Using the `toolchain` input lets dtolnay/rust-
          # toolchain resolve and install clippy correctly on all platforms.
          toolchain: 1.95.0
          components: clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --workspace

      - name: Unit tests
        run: cargo test --workspace -- --skip e2e_

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

      - name: E2E smoke tests (Linux/Windows)
        if: runner.os != 'macOS'
        run: cargo test -p nsl-cli --test e2e -- --test-threads=1

      - name: E2E smoke tests (macOS, non-blocking)
        if: runner.os == 'macOS'
        continue-on-error: true
        run: cargo test -p nsl-cli --test e2e -- --test-threads=1

  # WGGO Phase 2 merge-gate preview — runs the `#[ignore]`'d
  # end_to_end_backward_subprocess_matches_analytical_reference test with
  # --include-ignored on every push to a PR. Failure does NOT block merge
  # (continue-on-error: true). The output is posted as a PR comment so the
  # reviewer can evaluate before approving the second commit (the
  # `#[ignore]` flip). See spec §7.4 of the merge-gate completion design.
  #
  # This job exists only during PR 3's review window. The second commit
  # of PR 3 replaces it with a required `merge-gate` job that runs
  # without `--include-ignored` (the test will be live by then) and is
  # gated by a path filter on nsl-codegen / nsl-runtime / nsl-semantic.
  merge-gate-preview:
    name: WGGO Phase 2 merge-gate preview (continue-on-error)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    continue-on-error: true
    # The post-output step uses actions/github-script to POST a PR comment.
    # The default GITHUB_TOKEN lacks issues:write / pull-requests:write —
    # those must be granted at the job level for the comment-post to succeed.
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
          components: clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Run merge-gate test (ignored)
        id: merge_gate_run
        continue-on-error: true
        run: |
          cargo test -p nsl-codegen --test wggo_backward_pipeline -- \
            --include-ignored \
            end_to_end_backward_subprocess_matches_analytical_reference \
            --nocapture 2>&1 | tee preview-output.txt

      - name: Post output to PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let output = '';
            try {
              output = fs.readFileSync('preview-output.txt', 'utf8');
            } catch (_) {
              output = '(no output captured — the test step did not run or failed before redirecting)';
            }
            const truncated = output.length > 60000
              ? output.slice(-60000) + '\n...[truncated head]'
              : output;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '## merge-gate-preview output\n\n```\n' + truncated + '\n```\n\n_Reviewer: evaluate this output before approving the `#[ignore]` flip in commit 2. Failure does not block merge of commit 1._',
            });
