name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-release:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
          - os: macos-14
            target: aarch64-apple-darwin
            archive: tar.gz
          - os: macos-13
            target: x86_64-apple-darwin
            archive: tar.gz
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} -p nsl-cli

      - name: Build runtime library
        run: cargo build --release --target ${{ matrix.target }} -p nsl-runtime

      - name: Package toolchain (Unix)
        if: matrix.archive == 'tar.gz'
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          DIR="nsl-${TAG}-${{ matrix.target }}"
          mkdir -p "${DIR}/bin" "${DIR}/lib"
          cp "target/${{ matrix.target }}/release/nsl" "${DIR}/bin/nsl" || cp "target/${{ matrix.target }}/release/nsl-cli" "${DIR}/bin/nsl"
          cp "target/${{ matrix.target }}/release/libnsl_runtime.a" "${DIR}/lib/"
          cp -r stdlib "${DIR}/lib/stdlib"
          cp LICENSE README.md "${DIR}/"
          tar czf "${DIR}.tar.gz" "${DIR}"

      - name: Package toolchain (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $TAG = $env:GITHUB_REF -replace 'refs/tags/',''
          $DIR = "nsl-${TAG}-${{ matrix.target }}"
          New-Item -ItemType Directory -Path "${DIR}/bin","${DIR}/lib" -Force
          Copy-Item "target/${{ matrix.target }}/release/nsl.exe" "${DIR}/bin/nsl.exe" -ErrorAction SilentlyContinue
          if (-not (Test-Path "${DIR}/bin/nsl.exe")) { Copy-Item "target/${{ matrix.target }}/release/nsl-cli.exe" "${DIR}/bin/nsl.exe" }
          Copy-Item "target/${{ matrix.target }}/release/nsl_runtime.lib" "${DIR}/lib/" -ErrorAction SilentlyContinue
          Copy-Item -Recurse "stdlib" "${DIR}/lib/stdlib"
          Copy-Item LICENSE,README.md "${DIR}/"
          Compress-Archive -Path "${DIR}" -DestinationPath "${DIR}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nsl-${{ matrix.target }}
          path: nsl-*.${{ matrix.archive }}

  create-release:
    needs: build-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: nsl-*
          generate_release_notes: true
