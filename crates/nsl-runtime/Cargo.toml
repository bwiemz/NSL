[package]
name = "nsl-runtime"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "NeuralScript runtime library (static lib linked into compiled programs)"

[lib]
crate-type = ["staticlib", "rlib"]

[dependencies]
tokenizers = { version = "0.21", default-features = false, features = ["onig"] }
cudarc = { version = "0.19", default-features = false, features = ["driver", "cuda-version-from-build-system", "dynamic-linking"], optional = true }

[features]
default = []
cuda = ["dep:cudarc"]
